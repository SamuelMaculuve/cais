<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacto | CAIS Comunicacao & Consultoria</title>
  <meta name="description" content="Contacte a CAIS Comunicacao & Consultoria para diagnostico estrategico, comunicacao, carreira ou audiovisual.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div data-header></div>
  <main>
    <section class="page-hero"><div class="shell"><p class="breadcrumb">Home / Contacto</p><span class="eyebrow">Comecar conversa</span><h1 class="mt-5 max-w-5xl">Conte-nos o desafio. Nos ajudamos a dar forma ao proximo passo.</h1></div></section>
    <section class="section-tight">
      <div class="shell grid gap-8 lg:grid-cols-[.8fr_1.2fr]">
        <aside class="card reveal">
          <h2 class="font-display text-3xl">Contacto directo</h2>
          <div class="mt-6 grid gap-4 text-[var(--muted)]">
            <p><strong class="text-[var(--ink)]">Email:</strong> hello@cais.co.mz</p>
            <p><strong class="text-[var(--ink)]">Telefone:</strong> +258 84 000 0000</p>
            <p><strong class="text-[var(--ink)]">Localizacao:</strong> Maputo, Mocambique</p>
          </div>
        </aside>
        <form class="card grid gap-5 reveal" data-contact-form>
          <div class="grid gap-5 md:grid-cols-2">
            <div class="form-field"><label for="name">Nome</label><input id="name" name="name" required autocomplete="name"></div>
            <div class="form-field"><label for="email">Email</label><input id="email" name="email" type="email" required autocomplete="email"></div>
          </div>
          <div class="grid gap-5 md:grid-cols-2">
            <div class="form-field"><label for="service">Area de interesse</label><select id="service" name="service"><option>Comunicacao institucional</option><option>Consultoria de carreira</option><option>Orientacao vocacional</option><option>Producao audiovisual</option><option>Mentoria estrategica</option></select></div>
            <div class="form-field"><label for="phone">Telefone</label><input id="phone" name="phone" autocomplete="tel"></div>
          </div>
          <div class="form-field"><label for="message">Mensagem</label><textarea id="message" name="message" required></textarea></div>
          <button class="btn btn-primary justify-self-start" type="submit"><i data-lucide="send"></i> Enviar mensagem</button>
          <p class="text-sm font-bold text-[var(--teal)]" data-form-status aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>
  <div data-footer></div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
